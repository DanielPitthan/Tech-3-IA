# Configuração QLoRA para Fine-Tuning do Llama 3.1-8B-Instruct
# Hardware alvo: GPU local 8-12GB VRAM (ex: RTX 3060/4060)

lora:
  r: 16                          # Rank da decomposição LoRA
  lora_alpha: 32                 # Fator de escala (alpha/r = 2)
  lora_dropout: 0.05             # Dropout nas camadas LoRA
  bias: "none"                   # Sem bias nas camadas LoRA
  task_type: "CAUSAL_LM"         # Tipo de tarefa
  target_modules:                # Módulos alvo do Llama 3.1
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "./models/llama3-medical"
  num_train_epochs: 3
  per_device_train_batch_size: 1     # Reduzido para 6GB VRAM (RTX 4050)
  per_device_eval_batch_size: 1     # Reduzido para 6GB VRAM
  gradient_accumulation_steps: 16   # Effective batch = 16 (compensa batch_size=1)
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  optim: "paged_adamw_8bit"       # Otimizador paginado para economia de VRAM
  fp16: true
  bf16: false
  max_grad_norm: 0.3
  logging_steps: 10
  save_strategy: "epoch"
  eval_strategy: "epoch"
  save_total_limit: 2
  load_best_model_at_end: true
  report_to: "none"               # Usar "wandb" se configurado
  seed: 42
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false           # Requerido a partir do PyTorch 2.9

sft:
  max_seq_length: 512              # Reduzido para 6GB VRAM (economiza memória de ativações)
  packing: false                   # Desabilitado para simplicidade
  dataset_text_field: "text"       # Campo do dataset formatado
