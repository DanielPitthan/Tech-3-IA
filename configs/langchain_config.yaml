# Configuração LangChain

embeddings:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  device: "cpu"

vector_store:
  type: "chroma"
  persist_directory: "./chroma_db"
  collection_name: "medical_knowledge"
  search_type: "similarity"
  search_kwargs:
    k: 5

retriever:
  search_type: "mmr"              # Maximal Marginal Relevance
  search_kwargs:
    k: 5
    fetch_k: 20
    lambda_mult: 0.7              # Diversidade vs relevância

memory:
  type: "buffer_window"
  k: 5                            # Últimas 5 interações
  return_messages: true

chain:
  chain_type: "stuff"             # Método de combinação de documentos
  verbose: true
