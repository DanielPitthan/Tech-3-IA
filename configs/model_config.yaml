# Configuração do Modelo Base (Llama 3.1-8B-Instruct)
model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  provider: "ollama"
  base_url: "http://localhost:11434"
  trust_remote_code: false

# Configuração de Geração (Inferência)
generation:
  max_new_tokens: 512
  temperature: 0.3
  top_p: 0.9
  top_k: 50
  repetition_penalty: 1.15

# Tokenizer (não usado diretamente com Ollama, mantido para compatibilidade)
tokenizer:
  max_length: 4096
  padding: "max_length"
  truncation: true
  padding_side: "right"
